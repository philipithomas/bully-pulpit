name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Content pipeline check
        run: pnpm content:check

      - name: Internal link check
        run: pnpm links:check

      - name: Build
        run: pnpm build
