name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      # Fails the PR if a content change did not regenerate the committed
      # search index (merkle root mismatch) or any other generated artifact.
      # The search-index.yml workflow regenerates and commits the index on
      # push to main, so main self-heals; this is the PR-time gate.
      - name: Content pipeline check (images + search index)
        run: pnpm content:check

      - name: Internal link check
        run: pnpm links:check

      - name: Build
        run: pnpm build
