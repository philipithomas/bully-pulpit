# External link check for MDX content. Runs weekly (never on pull requests)
# because external sites flake: outages, bot blocking, rate limits. Failures
# file or update a GitHub issue instead of failing CI. Internal links are
# validated deterministically on every PR by `pnpm links:check` (check.yml).
name: Links

on:
  schedule:
    # Mondays 12:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      # Internal links in MDX are root-relative paths, which lychee would
      # otherwise try to resolve as local files. --base-url makes them
      # absolute own-domain URLs and the philipithomas.com exclude drops
      # them: Tier 1 (pnpm links:check) owns internal links. --scheme keeps
      # the run to http(s), skipping mailto. 403 and 429 count as alive:
      # bot blocking and rate limiting, not dead links.
      - name: Check external links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --cache
            --max-cache-age 1w
            --base-url 'https://www.philipithomas.com'
            --scheme https
            --scheme http
            --accept '200..=299,403,429'
            --timeout 30
            --max-retries 3
            --user-agent 'Mozilla/5.0 (compatible; lychee; +https://www.philipithomas.com)'
            --exclude '^https?://(www\.)?philipithomas\.com'
            --exclude '^https?://(localhost|127\.0\.0\.1|0\.0\.0\.0)'
            --exclude '^https?://([a-z0-9-]+\.)?example\.(com|org|net)'
            'content/**/*.mdx'
          fail: false
          output: ./lychee/out.md

      - name: Save lychee cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}

      - name: Find the open report issue
        if: steps.lychee.outputs.exit_code != 0
        id: report-issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number="$(gh issue list --repo "$GITHUB_REPOSITORY" --label 'broken links' --state open --limit 1 --json number --jq '.[0].number // empty')"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Create or update the report issue
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Broken external links
          content-filepath: ./lychee/out.md
          issue-number: ${{ steps.report-issue.outputs.number }}
          labels: broken links
