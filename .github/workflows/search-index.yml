name: Search index

# Layer 1 of the search-index staleness guard: main self-heals.
#
# `pnpm content:check` (pre-commit + the Check workflow) is the gate — it fails
# a commit/PR whose indexed content changed without a regenerated index. But
# most contributors lack the AI Gateway key, so the gate can block a merge it
# cannot fix locally. This workflow closes that gap: after a push to main, it
# regenerates the committed index and commits it back, so main is always in
# sync even when the PR author could not run `pnpm search:index`.
#
# Loop safety: the regen is deterministic and reuses vectors for unchanged
# chunk hashes, so a clean index produces no diff. The bot's own commit
# re-triggers this workflow once and then no-ops (no diff -> no commit -> no
# push). Belt and suspenders: the commit message carries "[skip ci]" and a
# concurrency group serializes runs on the branch.

on:
  push:
    branches: [main]
    # Only run when an input to the index changed: anything that feeds the
    # corpus (content/**), the generator, or the embedding/chunking pipeline.
    paths:
      - 'content/**'
      - 'scripts/generate-search-index.ts'
      - 'src/lib/search/**'

concurrency:
  group: search-index-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate search index
        env:
          # The AI Gateway client reads this automatically. Add it in repo
          # Settings > Secrets and variables > Actions as AI_GATEWAY_API_KEY.
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: pnpm search:index

      - name: Commit regenerated index if changed
        run: |
          if [ -n "$(git status --porcelain src/generated/)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add src/generated/search-index.json src/generated/related-posts.json
            git commit -m 'chore: regenerate search index [skip ci]'
            git push
          else
            echo 'Search index already in sync, nothing to commit.'
          fi
